name: quickrecon-web

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quickrecon-web
    ports:
      - "${QUICKRECON_PORT:-3001}:3001"
    environment:
      PORT: 3001
      QUICKRECON_JWT_SECRET: ${QUICKRECON_JWT_SECRET:-change-me-in-production}
    volumes:
      - ./storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
